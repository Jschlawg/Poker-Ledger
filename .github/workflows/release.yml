name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 1.0.0"
        required: true
        default: "1.0.0"

permissions:
  contents: write

jobs:
  windows-release:
    name: Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Determine version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
          } else {
            $version = "${{ github.ref_name }}".TrimStart("v")
          }

          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "RELEASE_TAG=v$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Test
        shell: pwsh
        run: dotnet test .\PokerLedger.sln -c Release

      - name: Publish Windows exe
        shell: pwsh
        run: .\src\PokerLedger.Avalonia\Publish-PokerLedger.ps1 -Version $env:RELEASE_VERSION

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: PokerLedger-${{ env.RELEASE_VERSION }}-win-x64
          path: dist/releases/*

      - name: Create or update GitHub release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $releaseNotes = @"
          Windows release for Poker Ledger $env:RELEASE_VERSION.

          Assets:
          - PokerLedger-$env:RELEASE_VERSION-win-x64.exe
          - PokerLedger-$env:RELEASE_VERSION-win-x64.zip
          - SHA256SUMS.txt for checksum verification
          "@

          gh release view $env:RELEASE_TAG *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:RELEASE_TAG .\dist\releases\* --clobber
            gh release edit $env:RELEASE_TAG --title "Poker Ledger $env:RELEASE_VERSION" --notes $releaseNotes
          } else {
            gh release create $env:RELEASE_TAG .\dist\releases\* --title "Poker Ledger $env:RELEASE_VERSION" --notes $releaseNotes
          }
